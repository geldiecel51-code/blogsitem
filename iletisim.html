  <style>
     body {
      margin: 0;
      min-height: 100vh; 
      font-family: Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(to bottom, #fc0101, #3848d8);}
    .profile-picture {
      width: 150px; 
      height: 150px;

    .contact-info {
      margin-top: 25px; }

      font-weight: bold; }
    a {
      color: #add8e6; 
      text-decoration: none;
      font-size: 18px;}
    a:hover {
      text-decoration: underline;}
    .home-button {
      display: inline-block; 
      margin-top: 40px; 
      padding: 12px 25px;
      background-color: #00af09;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      box-shadow: 0 4px 0 #1f8501;
      transition: all 0.2s ease;}
    .home-button:hover {
      background-color: #444;
      text-decoration: none;}
    .home-button:active {
        box-shadow: 0 2px 0 #333;
        transform: translateY(2px);}

  </style>
